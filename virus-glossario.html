<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossário Interativo — Vírus: Estrutura e Função</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#2563eb;
      --accent-2:#dbeafe;
      --border:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, var(--bg) 100%);
      color:var(--text);
    }

    .container{
      max-width:1100px;
      margin:0 auto;
      padding:32px 20px 48px;
    }

    header{
      background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6);
      color:#fff;
      padding:28px;
      border-radius:24px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }

    h1{
      margin:0 0 10px;
      font-size:2rem;
    }

    header p{
      margin:0;
      line-height:1.5;
      opacity:.96;
    }

    .toolbar{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:12px;
      margin:20px 0 24px;
    }

    .search-box, .select-box, .btn{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:var(--shadow);
    }

    .search-box input, .select-box select{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      padding:15px 16px;
      font-size:1rem;
      color:var(--text);
    }

    .btn{
      padding:0 16px;
      cursor:pointer;
      font-weight:700;
      color:var(--accent);
      min-height:52px;
      transition:transform .15s ease, background .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      background:#f8fbff;
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .badge{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
      color:var(--muted);
      font-size:.95rem;
      box-shadow:var(--shadow);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 14px 34px rgba(0,0,0,.12);
    }

    .card-header{
      padding:18px 18px 14px;
      cursor:pointer;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .term-number{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      border-radius:50%;
      background:var(--accent-2);
      color:var(--accent);
      font-weight:700;
      flex-shrink:0;
    }

    .title-wrap{
      flex:1;
    }

    .term-title{
      margin:0 0 6px;
      font-size:1.08rem;
      line-height:1.3;
    }

    .term-sub{
      margin:0;
      color:var(--muted);
      font-size:.92rem;
    }

    .toggle-icon{
      font-size:1.2rem;
      color:var(--accent);
      transition:transform .2s ease;
      user-select:none;
    }

    .card.open .toggle-icon{
      transform:rotate(45deg);
    }

    .card-content{
      max-height:0;
      overflow:hidden;
      transition:max-height .28s ease;
      border-top:1px solid transparent;
    }

    .card.open .card-content{
      border-top:1px solid var(--border);
      max-height:500px;
    }

    .content-inner{
      padding:16px 18px 18px;
    }

    .label{
      display:inline-block;
      font-size:.82rem;
      font-weight:700;
      color:var(--accent);
      background:var(--accent-2);
      padding:6px 10px;
      border-radius:999px;
      margin-bottom:10px;
    }

    .definition{
      margin:0;
      line-height:1.6;
    }

    .extras{
      margin-top:12px;
      padding-left:18px;
      color:var(--text);
    }

    .extras li{
      margin:6px 0;
      line-height:1.5;
    }

    .highlight{
      background:#fff3b0;
      padding:0 2px;
      border-radius:4px;
    }

    .empty{
      display:none;
      text-align:center;
      color:var(--muted);
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:18px;
      padding:32px 20px;
      box-shadow:var(--shadow);
      margin-top:8px;
    }

    footer{
      margin-top:28px;
      text-align:center;
      color:var(--muted);
      font-size:.92rem;
    }

    @media (max-width: 760px){
      .toolbar{
        grid-template-columns:1fr;
      }
      h1{
        font-size:1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    

    <section class="toolbar">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Pesquisar termo ou definição..." />
      </div>

      <div class="select-box">
        <select id="sortSelect" aria-label="Ordenar termos">
          <option value="number">Ordenar por número</option>
          <option value="az">Ordenar de A a Z</option>
        </select>
      </div>

      <button class="btn" id="toggleAllBtn" type="button">Abrir todos</button>
    </section>

    <div class="stats">
      <div class="badge">Total de termos: <strong id="totalCount">23</strong></div>
      <div class="badge">Resultados visíveis: <strong id="visibleCount">23</strong></div>
    </div>

    <div class="grid" id="glossaryGrid"></div>
    <div class="empty" id="emptyState">Nenhum termo encontrado. Tenta outra palavra-chave.</div>

    <footer>
    </footer>
  </div>

  <script>
    const terms = [
      {
        number: 1,
        title: "Vírus",
        definition: "Microrganismos sem estrutura celular, que não conseguem produzir energia nem replicar-se sozinhos. Precisam de uma célula hospedeira para se multiplicar."
      },
      {
        number: 2,
        title: "Parasita intracelular obrigatório",
        definition: "Os vírus são chamados assim porque só conseguem viver e replicar-se dentro de células, usando a maquinaria da célula hospedeira."
      },
      {
        number: 3,
        title: "Genoma viral",
        definition: "Material genético do vírus, que pode ser DNA ou RNA (nunca ambos) e contém a informação necessária para produzir novos vírus."
      },
      {
        number: 4,
        title: "Cápside",
        definition: "Estrutura proteica que envolve e protege o genoma viral e ajuda na interação com a célula hospedeira."
      },
      {
        number: 5,
        title: "Invólucro viral",
        definition: "Membrana lipídica externa presente em alguns vírus, derivada da célula hospedeira, que facilita a entrada na célula mas torna o vírus menos resistente no ambiente."
      },
      {
        number: 6,
        title: "Nucleocápside",
        definition: "Conjunto formado pelo genoma + cápside."
      },
      {
        number: 7,
        title: "Tropismo viral",
        definition: "Capacidade de um vírus infetar tipos específicos de células ou tecidos, dependendo dos recetores celulares disponíveis."
      },
      {
        number: 8,
        title: "Replicação viral",
        definition: "Processo pelo qual o vírus se multiplica dentro da célula, utilizando a maquinaria celular para produzir novos vírus."
      },
      {
        number: 9,
        title: "Adsorção (ligação)",
        definition: "Primeira etapa da infeção viral, onde o vírus se liga a recetores específicos da célula hospedeira."
      },
      {
        number: 10,
        title: "Penetração",
        definition: "Entrada do vírus na célula, que pode ocorrer por fusão de membranas, endocitose ou viropexis."
      },
      {
        number: 11,
        title: "Descapsidação",
        definition: "Libertação do genoma viral no interior da célula, permitindo o início da replicação."
      },
      {
        number: 12,
        title: "Síntese viral",
        definition: "Produção de proteínas virais e cópias do genoma dentro da célula hospedeira."
      },
      {
        number: 13,
        title: "Montagem viral",
        definition: "Formação de novos vírus a partir dos componentes produzidos (genoma + proteínas)."
      },
      {
        number: 14,
        title: "Libertação viral",
        definition: "Saída dos vírus da célula.",
        extras: [
          "Lise celular (morte da célula)",
          "Exocitose",
          "Gemulação (budding)"
        ]
      },
      {
        number: 15,
        title: "Vírus com invólucro",
        definition: "Vírus com membrana externa, menos resistentes no ambiente e geralmente transmitidos por fluidos corporais."
      },
      {
        number: 16,
        title: "Vírus sem invólucro",
        definition: "Vírus mais resistentes, capazes de sobreviver em condições adversas e frequentemente transmitidos por via fecal-oral ou superfícies contaminadas."
      },
      {
        number: 17,
        title: "Reservatório",
        definition: "Local onde o vírus vive e se multiplica naturalmente. No documento, o Homem é o principal reservatório."
      },
      {
        number: 18,
        title: "Transmissão viral",
        definition: "Forma como o vírus passa de um hospedeiro para outro.",
        extras: [
          "Direta (contacto, gotículas)",
          "Indireta (água, alimentos, objetos, vetores)"
        ]
      },
      {
        number: 19,
        title: "Patogénese",
        definition: "Conjunto de mecanismos através dos quais o vírus causa doença, incluindo dano celular e resposta imunitária."
      },
      {
        number: 20,
        title: "Efeito citopático",
        definition: "Alterações e danos causados pelo vírus na célula, podendo levar à sua morte."
      },
      {
        number: 21,
        title: "Período de incubação",
        definition: "Tempo entre a infeção e o aparecimento dos sintomas, durante o qual o vírus se replica."
      },
      {
        number: 22,
        title: "Virémia",
        definition: "Presença de vírus no sangue, permitindo a sua disseminação no organismo."
      },
      {
        number: 23,
        title: "Diagnóstico viral",
        definition: "Métodos para identificar vírus.",
        extras: [
          "PCR (detetar genoma)",
          "Serologia (anticorpos)",
          "Cultura celular"
        ]
      }
    ];

    const glossaryGrid = document.getElementById("glossaryGrid");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const toggleAllBtn = document.getElementById("toggleAllBtn");
    const totalCount = document.getElementById("totalCount");
    const visibleCount = document.getElementById("visibleCount");
    const emptyState = document.getElementById("emptyState");

    let areAllOpen = false;

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const safe = escapeHtml(text);
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(`(${escapedQuery})`, "gi");
      return safe.replace(regex, '<span class="highlight">$1</span>');
    }

    function getFilteredAndSortedTerms() {
      const query = searchInput.value.trim().toLowerCase();
      const sortMode = sortSelect.value;

      let filtered = terms.filter(term => {
        const extraText = (term.extras || []).join(" ").toLowerCase();
        return (
          term.title.toLowerCase().includes(query) ||
          term.definition.toLowerCase().includes(query) ||
          extraText.includes(query) ||
          String(term.number).includes(query)
        );
      });

      if (sortMode === "az") {
        filtered.sort((a, b) => a.title.localeCompare(b.title, "pt"));
      } else {
        filtered.sort((a, b) => a.number - b.number);
      }

      return filtered;
    }

    function renderGlossary() {
      const query = searchInput.value.trim();
      const data = getFilteredAndSortedTerms();

      glossaryGrid.innerHTML = "";
      totalCount.textContent = terms.length;
      visibleCount.textContent = data.length;
      emptyState.style.display = data.length ? "none" : "block";

      data.forEach(term => {
        const card = document.createElement("article");
        card.className = "card";
        if (areAllOpen) card.classList.add("open");

        card.innerHTML = `
          <div class="card-header" role="button" tabindex="0" aria-expanded="${areAllOpen ? 'true' : 'false'}">
            <div class="term-number">${term.number}</div>
            <div class="title-wrap">
              <h2 class="term-title">${highlightText(term.title, query)}</h2>
              <p class="term-sub">Clica para ver a definição</p>
            </div>
            <div class="toggle-icon">+</div>
          </div>
          <div class="card-content">
            <div class="content-inner">
              <span class="label">Definição</span>
              <p class="definition">${highlightText(term.definition, query)}</p>
              ${term.extras ? `
                <ul class="extras">
                  ${term.extras.map(item => `<li>${highlightText(item, query)}</li>`).join("")}
                </ul>
              ` : ""}
            </div>
          </div>
        `;

        const header = card.querySelector(".card-header");

        function toggleCard() {
          card.classList.toggle("open");
          header.setAttribute("aria-expanded", card.classList.contains("open") ? "true" : "false");
        }

        header.addEventListener("click", toggleCard);
        header.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleCard();
          }
        });

        glossaryGrid.appendChild(card);
      });
    }

    toggleAllBtn.addEventListener("click", () => {
      areAllOpen = !areAllOpen;
      toggleAllBtn.textContent = areAllOpen ? "Fechar todos" : "Abrir todos";
      renderGlossary();
    });

    searchInput.addEventListener("input", renderGlossary);
    sortSelect.addEventListener("change", renderGlossary);

    renderGlossary();
  </script>
</body>
</html>
