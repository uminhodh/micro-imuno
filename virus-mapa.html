<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa mental — Vírus</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji",
        "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      background:
        radial-gradient(circle at top left, rgba(120, 130, 150, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(180, 190, 210, 0.10), transparent 28%),
        #f8fafc;
      color: #243142;
    }

    .map-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #mindmap {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 20;
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(148, 163, 184, 0.25);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .control-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: #eef2f7;
      color: #243142;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .control-btn:hover {
      background: #dde5ef;
      transform: translateY(-1px);
    }

    .hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(148, 163, 184, 0.22);
      backdrop-filter: blur(8px);
      color: #475569;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
  </style>
</head>
<body>
  <div class="map-shell">
    <div class="controls">
      <button class="control-btn" id="zoomInBtn" title="Aumentar">+</button>
      <button class="control-btn" id="zoomOutBtn" title="Diminuir">−</button>
      <button class="control-btn" id="fitBtn" title="Centrar">⌂</button>
    </div>

    <div class="hint">
      Arrasta para mover · ctrl + roda do rato para zoom · clique nos nós para expandir
    </div>

    <svg id="mindmap"></svg>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>

    function collapseFromLevel(node, level = 0) {
      if (!node.children?.length) return node;

      if (level >= 2) {
        node.payload = node.payload || {};
        node.payload.fold = 1;
      }

      node.children.forEach(child => collapseFromLevel(child, level + 1));
      return node;
    }

    const data = collapseFromLevel(rawData);

    const { markmap } = window;
    const mm = markmap.Markmap.create("svg#mindmap", {
      autoFit: true,
      fitRatio: 0.92,
      maxWidth: 260,
      spacingVertical: 14,
      spacingHorizontal: 90,
      paddingX: 16,
      duration: 300,
      zoom: true,
      pan: true,
      colorFreezeLevel: 2,
      initialExpandLevel: 2
    }, data);

    function fitMap() {
      if (typeof mm.fit === "function") {
        mm.fit();
      }
    }

    function zoomBy(factor) {
      const svg = d3.select("#mindmap");
      const currentTransform = d3.zoomTransform(svg.node());
      const nextScale = Math.max(0.5, Math.min(2.4, currentTransform.k * factor));

      svg.transition().duration(180).call(
        mm.zoom.transform,
        d3.zoomIdentity
          .translate(currentTransform.x, currentTransform.y)
          .scale(nextScale)
      );
    }

    document.getElementById("zoomInBtn").addEventListener("click", () => zoomBy(1.2));
    document.getElementById("zoomOutBtn").addEventListener("click", () => zoomBy(0.85));
    document.getElementById("fitBtn").addEventListener("click", fitMap);

    window.addEventListener("load", () => {
      setTimeout(fitMap, 220);
    });

    window.addEventListener("resize", () => {
      setTimeout(fitMap, 120);
    });
  </script>
</body>
</html>
