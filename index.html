<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trilha de Aprendizagem · Microbiologia</title>
    <link href="./output.css" rel="stylesheet" />

    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(120, 130, 150, 0.10), transparent 30%),
          radial-gradient(circle at bottom right, rgba(180, 190, 210, 0.12), transparent 28%);
      }

      .fade-in {
        opacity: 0;
        transform: translateY(12px);
        animation: fadeIn 0.5s ease forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .page-shell {
        min-height: calc(100vh - 80px);
      }

      .sidebar-card,
      .content-card {
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(160, 170, 185, 0.20);
        backdrop-filter: blur(10px);
      }

      .menu-button {
        width: 100%;
        text-align: left;
        border-radius: 14px;
        padding: 0.85rem 1rem;
        transition: all 0.2s ease;
        color: #334155;
      }

      .menu-button:hover {
        background: rgba(79, 98, 120, 0.08);
      }

      .menu-button.active {
        background: #4f6278;
        color: white;
      }

      .topic-title {
        color: #243142;
      }

      .muted-accent {
        color: #607089;
      }

      .viewer-frame {
        width: 100%;
        min-height: 70vh;
        border: none;
        border-radius: 18px;
        background: white;
      }

      .placeholder-box {
        border: 1px dashed rgba(96, 112, 137, 0.35);
        border-radius: 18px;
      }

      .soft-badge {
        background: rgba(79, 98, 120, 0.10);
        color: #4f6278;
      }

      details > summary {
        list-style: none;
      }

      details > summary::-webkit-details-marker {
        display: none;
      }
    </style>
  </head>

  <body class="min-h-screen text-base-content">
    <div class="navbar bg-white/80 backdrop-blur border-b border-base-300 sticky top-0 z-30">
      <div class="flex-1">
        <a href="index.html" class="btn btn-ghost text-xl text-slate-800">
          Fundamentos de Microbiologia
        </a>
      </div>
      <div class="flex-none">
        <a href="index.html" class="btn btn-outline rounded-xl">
          Voltar
        </a>
      </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 page-shell">
      <div class="mb-6 fade-in">
        <h1 class="text-3xl md:text-4xl font-bold topic-title">
          Trilha de Aprendizagem
        </h1>
        <p class="mt-2 text-base md:text-lg muted-accent">
          Seleciona um tópico à esquerda para explorar os materiais.
        </p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-[320px_minmax(0,1fr)] gap-6">
        <!-- SIDEBAR -->
        <aside class="sidebar-card rounded-3xl p-4 shadow-sm fade-in">
          <div class="mb-4">
            <h2 class="text-lg font-semibold topic-title">Conteúdos</h2>
            <p class="text-sm text-base-content/60 mt-1">
              Vírus e bactérias
            </p>
          </div>

          <div class="space-y-3">
            <details open class="bg-white rounded-2xl border border-base-200">
              <summary class="cursor-pointer px-4 py-3 font-semibold topic-title">
                Vírus
              </summary>
              <div class="px-3 pb-3 space-y-2">
                <button class="menu-button active" data-type="virus" data-content="glossario">
                  Glossário
                </button>
                <button class="menu-button" data-type="virus" data-content="imagem">
                  Imagem
                </button>
                <button class="menu-button" data-type="virus" data-content="audio">
                  Áudio
                </button>
                <button class="menu-button" data-type="virus" data-content="mapa">
                  Mapa mental
                </button>
              </div>
            </details>

            <details class="bg-white rounded-2xl border border-base-200">
              <summary class="cursor-pointer px-4 py-3 font-semibold topic-title">
                Bactérias
              </summary>
              <div class="px-3 pb-3 space-y-2">
                <button class="menu-button" data-type="bacteria" data-content="glossario">
                  Glossário
                </button>
                <button class="menu-button" data-type="bacteria" data-content="imagem">
                  Imagem
                </button>
                <button class="menu-button" data-type="bacteria" data-content="audio">
                  Áudio
                </button>
                <button class="menu-button" data-type="bacteria" data-content="mapa">
                  Mapa mental
                </button>
              </div>
            </details>
          </div>
        </aside>

        <!-- CONTENT -->
        <section class="content-card rounded-3xl p-4 md:p-6 shadow-sm fade-in">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-5">
            <div>
              <div id="contentBadge" class="badge soft-badge border-0 mb-2">
                Vírus
              </div>
              <h2 id="contentTitle" class="text-2xl md:text-3xl font-bold topic-title">
                Glossário
              </h2>
              <p id="contentDescription" class="mt-2 text-base-content/65">
                Consulta definições essenciais de virologia.
              </p>
            </div>
          </div>

          <div id="contentArea" class="fade-in">
            <!-- conteúdo injetado via JS -->
          </div>
        </section>
      </div>
    </main>

    <script>
      const contentArea = document.getElementById("contentArea");
      const contentTitle = document.getElementById("contentTitle");
      const contentDescription = document.getElementById("contentDescription");
      const contentBadge = document.getElementById("contentBadge");
      const buttons = document.querySelectorAll(".menu-button");

      const contentMap = {
        virus: {
          glossario: {
            title: "Glossário",
            description: "Consulta definições essenciais de virologia.",
            render: () => `
              <iframe
                class="viewer-frame"
                src="./virus-glossario.html"
                title="Glossário de vírus">
              </iframe>
            `
          },
          imagem: {
            title: "Banda Desenhada e Diagrama",
            description: "Visualiza a banda desenhada e  o infográfico",
            render: () => `
                <div class="space-y-6">

                    <!-- IMAGEM 1 -->
                    <div>
                    <img
                        src="./virus-bd.png"
                        onclick="openImageModal('./virus-bd.png')"
                        class="cursor-zoom-in rounded-3xl border border-base-200 hover:scale-[1.01] transition"
                    />
                    </div>

                    <!-- IMAGEM 2 -->
                    <div>
                    <img
                        src="./infografico-virus.png"
                        onclick="openImageModal('./infografico-virus.png')"
                        class="cursor-zoom-in rounded-3xl border border-base-200 hover:scale-[1.01] transition"
                    />
                    </div>

                </div>
                `
          },
          audio: {
            title: "Podcast",
            description: "Escuta o conteúdo áudio sobre vírus.",
            render: () => `
              <div class="space-y-4">
                <div class="rounded-3xl bg-white border border-base-200 p-6">
                  <h3 class="text-xl font-semibold topic-title mb-2">Podcast 1</h3>
                  
                  <audio controls class="w-full">
                    <source src="./virus-audio.m4a" type="audio/mp4" />
                    O teu navegador não suporta reprodução de áudio.
                  </audio>

                  <h3 class="text-xl font-semibold topic-title mb-2">Podcast 2</h3>
                  
                  <iframe
                    src="https://drive.google.com/file/d/1GUyv069Vol93LAYjFPCdYTOG9G6MyyAC/preview"
                    width="100%"
                    height="120"
                    allow="autoplay">
                  </iframe>
                </div>
              </div>
            `
          },
          mapa: {
            title: "Mapa mental",
            description: "Explora a organização dos conceitos principais sobre vírus.",
            render: () => `
              <iframe
                class="viewer-frame"
                src="./virus-mapa.html"
                title="Mapa mental de vírus">
              </iframe>
            `
          }
        },

        bacteria: {
          glossario: {
            title: "Glossário",
            description: "Espaço reservado para o glossário de bactérias.",
            render: () => placeholder("Glossário de bactérias", "Quando me enviares o glossário de bactérias, eu ligo aqui diretamente.")
          },
          imagem: {
            title: "Imagem",
            description: "Espaço reservado para a imagem de bactérias.",
            render: () => placeholder("Imagem de bactérias", "Aqui pode entrar uma imagem, esquema ou infográfico.")
          },
          audio: {
            title: "Áudio",
            description: "Espaço reservado para o áudio de bactérias.",
            render: () => placeholder("Áudio de bactérias", "Aqui pode entrar um ficheiro áudio com explicação do conteúdo.")
          },
          mapa: {
            title: "Mapa mental",
            description: "Espaço reservado para o mapa mental de bactérias.",
            render: () => placeholder("Mapa mental de bactérias", "Quando me enviares o ficheiro, eu deixo esta secção funcional.")
          }
        }
      };

      function placeholder(title, text) {
        return `
          <div class="placeholder-box bg-white/70 p-8 md:p-10 text-center">
            <h3 class="text-2xl font-semibold topic-title mb-3">${title}</h3>
            <p class="text-base-content/65 max-w-2xl mx-auto">
              ${text}
            </p>
          </div>
        `;
      }

      function setActiveButton(type, content) {
        buttons.forEach(btn => {
          const isActive =
            btn.dataset.type === type && btn.dataset.content === content;
          btn.classList.toggle("active", isActive);
        });
      }

      function loadContent(type, content) {
        const item = contentMap[type][content];

        contentBadge.textContent = type === "virus" ? "Vírus" : "Bactérias";
        contentTitle.textContent = item.title;
        contentDescription.textContent = item.description;

        contentArea.classList.remove("fade-in");
        contentArea.innerHTML = "";
        void contentArea.offsetWidth;
        contentArea.innerHTML = item.render();
        contentArea.classList.add("fade-in");

        setActiveButton(type, content);
      }

      buttons.forEach(button => {
        button.addEventListener("click", () => {
          loadContent(button.dataset.type, button.dataset.content);
        });
      });

      loadContent("virus", "glossario");
    </script>
    <dialog id="imageModal" class="modal">
        <div class="modal-box max-w-5xl bg-black p-2">
          <img id="modalImage" src="" class="w-full rounded-xl" />
        </div>
        <form method="dialog" class="modal-backdrop">
          <button>close</button>
        </form>
    </dialog>
    <script>
        function openImageModal(src) {
          const modal = document.getElementById("imageModal");
          const img = document.getElementById("modalImage");
      
          img.src = src;
          modal.showModal();
        }
    </script>
  </body>
</html>
